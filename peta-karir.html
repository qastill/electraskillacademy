      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>

<div id="app"><div class="loading"><div><div class="spinner"></div><p>Memuat peta karir...</p></div></div></div>

<script src="peta-karir-data.js"></script>
<script>
const DATA = window.__PETA_KARIR_DATA;
const state = {query:'',bidang:'all',level:'all',area:'all',selected:null};
const $ = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => [...el.querySelectorAll(sel)];
const escHtml = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function filterOkupasi() {
  const q = state.query.toLowerCase();
  return DATA.okupasi.filter(o => {
    if (state.bidang !== 'all' && o.bidang !== state.bidang) return false;
    if (state.level !== 'all' && o.level !== parseInt(state.level)) return false;
    if (state.area !== 'all' && o.area_fungsi !== state.area) return false;
    if (q && !o.name.toLowerCase().includes(q)) return false;
    return true;
  });
}
function groupOkupasi(list) {
  const g = {};
  list.forEach(o => { if (!g[o.bidang]) g[o.bidang] = {}; if (!g[o.bidang][o.level]) g[o.bidang][o.level] = []; g[o.bidang][o.level].push(o); });
  return g;
}
function render() {
  const filtered = filterOkupasi();
  const grouped = groupOkupasi(filtered);
  const bidangOrder = ['pembangkit', 'transmisi', 'distribusi', 'pemanfaatan'];
  const visibleBidang = bidangOrder.filter(b => grouped[b]);
  const html = renderHero() + renderStats() + renderFilters(filtered.length) +
    '<main class="container">' + (filtered.length === 0 ? renderEmpty() : visibleBidang.map(b => renderBidangSection(b, grouped[b])).join('')) + '</main>' +
    renderFooter() + renderModal();
  $('#app').innerHTML = html;
  attachListeners();
}
function renderHero(){return `<header class="hero"><div class="hero-grid"></div><div class="container hero-inner"><div class="brand-line"><div class="dash"></div><span>Electra Skill Academy presents</span></div><h1><span class="line1">Peta Karir</span><span class="line2">Ketenagalistrikan</span><span class="line3">Indonesia</span></h1><div class="hero-sub"><div class="dash"></div><p>${escHtml(DATA.metadata.subtitle)}</p></div><p class="hero-desc">Eksplorasi <strong>${DATA.metadata.total_okupasi} okupasi nasional</strong> di sektor ketenagalistrikan Indonesia — lengkap dengan detail tugas, skill wajib, tanggung jawab, dan wewenang. Terstruktur menurut KKNI Level 1 hingga 9.</p><div class="hero-pills"><span class="pill">📘 ${escHtml(DATA.metadata.issuer)}</span><span class="pill">📅 Edisi ${DATA.metadata.year}</span><span class="pill">📑 ${DATA.metadata.source_pages} halaman sumber</span><span class="pill">💼 Klik kartu untuk detail lengkap</span></div></div></header>`;}
function renderStats(){const e=Object.entries(DATA.bidang).filter(([k])=>k!=='umum');return `<section class="stats"><div class="container stats-inner"><div class="stats-grid">${e.map(([k,m])=>{const c=DATA.stats.by_bidang[k]||0;return `<div><div class="stat-icon">${m.icon}</div><div class="stat-num">${c}</div><div class="stat-label">${escHtml(m.name)}</div></div>`;}).join('')}</div></div></section>`;}
function renderFilters(resultCount){const hasFilter=state.query||state.bidang!=='all'||state.level!=='all'||state.area!=='all';return `<section class="filter"><div class="container filter-inner"><div class="search"><svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg><input id="search-input" type="text" placeholder="Cari okupasi..." value="${escHtml(state.query)}"><button class="search-clear ${state.query?'show':''}" id="search-clear">✕</button></div><div class="filters-row"><select class="filter-select" id="filter-bidang"><option value="all">Semua Bidang</option>${Object.entries(DATA.bidang).filter(([k])=>k!=='umum').map(([k,v])=>`<option value="${k}" ${state.bidang===k?'selected':''}>${v.icon} ${escHtml(v.name)}</option>`).join('')}</select><select class="filter-select" id="filter-level"><option value="all">Semua Level</option>${Object.entries(DATA.levels).sort((a,b)=>parseInt(b[0])-parseInt(a[0])).map(([k,v])=>`<option value="${k}" ${state.level===k?'selected':''}>${v.kkni} — ${escHtml(v.label)}</option>`).join('')}</select><select class="filter-select" id="filter-area"><option value="all">Semua Area</option>${Object.entries(DATA.area_fungsi).map(([k,v])=>`<option value="${k}" ${state.area===k?'selected':''}>${escHtml(v)}</option>`).join('')}</select><button class="reset-btn ${hasFilter?'show':''}" id="reset-btn">Reset semua</button><div class="result-count"><strong>${resultCount}</strong> dari ${DATA.metadata.total_okupasi} okupasi</div></div></div></section>`;}
function renderBidangSection(bk,levels){const b=DATA.bidang[bk];if(!b)return '';const sl=Object.keys(levels).sort((a,c)=>parseInt(c)-parseInt(a));return `<div class="bidang-section"><div class="bidang-header"><div class="top"><span class="icon">${b.icon}</span><span class="label">Bidang</span></div><h2>${escHtml(b.name)}</h2><p>${escHtml(b.description)}</p></div>${sl.map(lk=>{const l=DATA.levels[lk];const i=levels[lk];return `<div class="level-block"><div class="level-head"><div class="kkni">${escHtml(l.kkni)}</div><div class="name">${escHtml(l.label)}</div><div class="divider"></div><div class="count">${i.length} okupasi</div></div><div class="cards">${i.map((o,idx)=>renderCard(o,idx)).join('')}</div></div>`;}).join('')}</div>`;}
function renderCard(o){const al=DATA.area_fungsi[o.area_fungsi]?.split(' ')[0]||o.area_fungsi;return `<button class="card area-${o.area_fungsi}" data-name="${escHtml(o.name)}"><div class="card-top"><span class="card-badge area-${o.area_fungsi}">${escHtml(al)}</span><span class="card-page">hal. ${o.page}</span></div><p class="card-name">${escHtml(o.name)}</p><div class="card-arrow"><span>Lihat detail</span><span class="arr">→</span></div></button>`;}
function renderEmpty(){return `<div class="empty"><h3>Tidak ada okupasi ditemukan</h3><p>Coba ubah filter atau kata kunci pencarian.</p></div>`;}
function renderModal(){if(!state.selected)return '<div class="modal-backdrop" id="modal-backdrop"></div>';const o=state.selected;const b=DATA.bidang[o.bidang];const l=DATA.levels[o.level];const a=DATA.area_fungsi[o.area_fungsi];const d=o.detail||{};const s=[];let n=1;if(d.definisi)s.push(`<div class="section"><div class="section-head"><span class="num">${n++}.</span><span class="icon">📋</span><h3>Definisi Jabatan</h3></div><div class="section-content"><p>${escHtml(d.definisi)}</p></div></div>`);if(d.lingkup)s.push(`<div class="section"><div class="section-head"><span class="num">${n++}.</span><span class="icon">🎯</span><h3>Lingkup Pekerjaan</h3></div><div class="section-content"><p>${escHtml(d.lingkup)}</p></div></div>`);if(d.profil&&d.profil.length)s.push(`<div class="section"><div class="section-head"><span class="num">${n++}.</span><span class="icon">⚡</span><h3>Skill & Profil Wajib</h3></div><div class="section-content"><div class="skills-grid">${d.profil.map(t=>`<span class="skill-tag">${escHtml(t)}</span>`).join('')}</div></div></div>`);if(d.tanggung_jawab&&d.tanggung_jawab.length)s.push(`<div class="section"><div class="section-head"><span class="num">${n++}.</span><span class="icon">🛡️</span><h3>Tanggung Jawab</h3></div><div class="section-content"><ul>${d.tanggung_jawab.map(t=>`<li>${escHtml(t)}</li>`).join('')}</ul></div></div>`);if(d.wewenang&&d.wewenang.length)s.push(`<div class="section"><div class="section-head"><span class="num">${n++}.</span><span class="icon">🔑</span><h3>Wewenang</h3></div><div class="section-content"><ul>${d.wewenang.map(t=>`<li>${escHtml(t)}</li>`).join('')}</ul></div></div>`);if(d.tugas_utama&&d.tugas_utama.length)s.push(`<div class="section"><div class="section-head"><span class="num">${n++}.</span><span class="icon">⚙️</span><h3>Tugas Utama</h3></div><div class="section-content"><ul>${d.tugas_utama.map(t=>`<li>${escHtml(t)}</li>`).join('')}</ul></div></div>`);if(d.tugas_khusus&&d.tugas_khusus.length)s.push(`<div class="section"><div class="section-head"><span class="num">${n++}.</span><span class="icon">📐</span><h3>Tugas Khusus</h3></div><div class="section-content"><ul>${d.tugas_khusus.map(t=>`<li>${escHtml(t)}</li>`).join('')}</ul></div></div>`);if(d.persyaratan&&d.persyaratan.length)s.push(`<div class="section"><div class="section-head"><span class="num">${n++}.</span><span class="icon">🎓</span><h3>Persyaratan / Jenjang Karir</h3></div><div class="section-content"><ul>${d.persyaratan.map(t=>`<li>${escHtml(t)}</li>`).join('')}</ul></div></div>`);const dc=s.length?s.join(''):'<div class="no-detail">Detail lengkap untuk okupasi ini sedang dilengkapi. Silakan rujuk halaman '+o.page+' di Buku Peta Okupasi 2018.</div>';return `<div class="modal-backdrop show" id="modal-backdrop"><div class="modal" onclick="event.stopPropagation()"><button class="modal-close" id="modal-close" aria-label="Tutup">✕</button><div class="modal-body"><div class="modal-bidang"><span class="icon">${b.icon}</span><span class="label">${escHtml(b.name)}</span></div><div class="modal-level-badge"><span class="kkni">${escHtml(l.kkni)}</span><span class="sep"></span><span class="label">${escHtml(l.label)}</span></div><h2>${escHtml(o.name)}</h2><div class="modal-meta"><span class="chip">📁 ${escHtml(a)}</span><span class="chip">📄 Hal. ${o.page}</span></div>${dc}<div class="tips-box"><h3>💡 Jalur Pengembangan</h3><p>Okupasi ini berada pada <strong>${escHtml(l.kkni)}</strong>. Untuk naik ke level berikutnya, biasanya diperlukan: penambahan jam pengalaman lapangan, sertifikasi BNSP/LSP yang relevan dengan area <em>${escHtml(a.toLowerCase())}</em>, dan pendidikan/pelatihan teknis lanjutan.</p><p class="tips-note">* Persyaratan detail tersedia di SKKNI Ketenagalistrikan yang diterbitkan Kemnaker.</p></div><div class="modal-footer"><p>Sumber: Buku Peta Okupasi Nasional Ketenagalistrikan 2018 — Kementerian ESDM</p><button class="btn-close" id="btn-close-modal">Tutup</button></div></div></div></div>`;}
function renderFooter(){return `<footer><div class="container footer-inner"><div class="footer-grid"><div class="footer-brand"><div class="top"><div class="dash"></div><span>Electra Skill Academy</span></div><h3>Peta Karir Ketenagalistrikan</h3><p>Visualisasi interaktif Buku Peta Okupasi Nasional Sub Sektor Ketenagalistrikan 2018 — lengkap dengan detail jabatan, skill wajib, tugas, dan wewenang.</p></div><div class="footer-col"><h4>Sumber Data</h4><ul><li>Direktorat Jenderal Ketenagalistrikan</li><li>Kementerian ESDM Republik Indonesia</li><li>Edisi Tahun 2018 — 688 halaman</li><li>Standar KKNI Level 1–9</li></ul></div><div class="footer-col"><h4>Hubungi Electra</h4><ul><li><a href="/">electraacademy.com</a></li><li><a href="https://wa.me/6285121532407" target="_blank" rel="noreferrer">WhatsApp: 0851-2153-2407</a></li></ul></div></div><div class="footer-bottom"><p>© ${new Date().getFullYear()} Electra Skill Academy. Data publik dari Kementerian ESDM RI.</p><p class="italic">Built with ♦ for Indonesia's electrical workforce</p></div></div></footer>`;}
function attachListeners(){const si=$('#search-input');if(si){si.addEventListener('input',e=>{state.query=e.target.value;const cb=$('#search-clear');if(cb)cb.classList.toggle('show',!!state.query);const c=filterOkupasi().length;const rc=$('.result-count');if(rc)rc.innerHTML=`<strong>${c}</strong> dari ${DATA.metadata.total_okupasi} okupasi`;const rb=$('#reset-btn');if(rb){const h=state.query||state.bidang!=='all'||state.level!=='all'||state.area!=='all';rb.classList.toggle('show',h);}renderGridOnly();});}$('#search-clear')?.addEventListener('click',()=>{state.query='';render();});$('#filter-bidang')?.addEventListener('change',e=>{state.bidang=e.target.value;render();});$('#filter-level')?.addEventListener('change',e=>{state.level=e.target.value;render();});$('#filter-area')?.addEventListener('change',e=>{state.area=e.target.value;render();});$('#reset-btn')?.addEventListener('click',()=>{state.query='';state.bidang='all';state.level='all';state.area='all';render();});$('#modal-close')?.addEventListener('click',closeModal);$('#btn-close-modal')?.addEventListener('click',closeModal);$('#modal-backdrop')?.addEventListener('click',closeModal);attachCardListeners();}
function attachCardListeners(){$$('.card').forEach(c=>{c.addEventListener('click',()=>{const n=c.dataset.name;const f=DATA.okupasi.find(o=>o.name===n);if(f){state.selected=f;render();}});});}
function renderGridOnly(){const f=filterOkupasi();const g=groupOkupasi(f);const bo=['pembangkit','transmisi','distribusi','pemanfaatan'];const vb=bo.filter(b=>g[b]);const m=$('main');if(m){m.innerHTML=f.length===0?renderEmpty():vb.map(b=>renderBidangSection(b,g[b])).join('');attachCardListeners();}}
function closeModal(){state.selected=null;document.body.style.overflow='';render();}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&state.selected)closeModal();});
render();
</script>
</body>
